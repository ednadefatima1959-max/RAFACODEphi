name: Android CI (delegated to canonical)

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: "Build variant"
        type: choice
        options: [debug, release, both]
        default: both
      mode:
        description: "Execution mode profile"
        type: choice
        options: [fast, moderado, profundo, ultra_minucioso, diagnostico, interoperavel, confiavel, portavel, hardening, matrix_total, forense]
        default: moderado
      run_lint:
        description: "Run lint checks"
        type: boolean
        default: true
      run_native_matrix:
        description: "Run native matrix checks"
        type: boolean
        default: true
      signing_mode:
        description: "Release signing mode"
        type: choice
        options: [auto, unsigned, signed]
        default: auto
  workflow_call:
    inputs:
      provenance_run_id:
        required: true
        type: string
      expected_sha:
        required: true
        type: string
      provenance_manifest_hash:
        required: true
        type: string
      build_variant:
        required: false
        type: string
        default: "both"
      mode:
        required: false
        type: string
        default: "moderado"
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_matrix:
        required: false
        type: boolean
        default: true
      signing_mode:
        required: false
        type: string
        default: "auto"

permissions:
  contents: read
  actions: read

jobs:
  canonical-manual:
    if: github.event_name == 'workflow_dispatch'
    name: Delegate manual run to canonical
    uses: ./.github/workflows/android-verified.yml
    with:
      provenance_run_id: ""
      expected_sha: ""
      provenance_manifest_hash: ""
      build_variant: ${{ github.event.inputs.build_variant }}
      mode: ${{ github.event.inputs.mode }}
      run_lint: ${{ github.event.inputs.run_lint == 'true' }}
      run_native_matrix: ${{ github.event.inputs.run_native_matrix == 'true' }}
      signing_mode: ${{ github.event.inputs.signing_mode }}
    secrets: inherit

  canonical-called:
    if: github.event_name == 'workflow_call'
    name: Delegate reusable call to canonical
    uses: ./.github/workflows/android-verified.yml
    with:
      provenance_run_id: ${{ inputs.provenance_run_id }}
      expected_sha: ${{ inputs.expected_sha }}
      provenance_manifest_hash: ${{ inputs.provenance_manifest_hash }}
      build_variant: ${{ inputs.build_variant }}
      mode: ${{ inputs.mode }}
      run_lint: ${{ inputs.run_lint }}
      run_native_matrix: ${{ inputs.run_native_matrix }}
      signing_mode: ${{ inputs.signing_mode }}
    secrets: inherit
