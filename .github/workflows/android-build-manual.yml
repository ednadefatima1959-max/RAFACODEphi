name: android-build-manual

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Perfil de execução"
        required: true
        type: choice
        default: moderado
        options:
          - fast
          - moderado
          - profundo
          - ultra_minucioso
          - diagnostico
          - interoperavel
          - confiavel
          - portavel
          - hardening
          - matrix_total
          - forense
      build_variant:
        description: "Seleciona debug/release/both"
        required: true
        type: choice
        default: both
        options:
          - debug
          - release
          - both
      run_lint:
        description: "Executar lint"
        required: false
        type: boolean
        default: true
      run_native_matrix:
        description: "Executar matriz nativa"
        required: false
        type: boolean
        default: true
      signing_mode:
        description: "Modo de assinatura release"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - unsigned
          - signed
  workflow_call:
    inputs:
      provenance_run_id:
        required: false
        type: string
        default: ""
      expected_sha:
        required: false
        type: string
        default: ""
      provenance_manifest_hash:
        required: false
        type: string
        default: ""
      mode:
        required: false
        type: string
        default: "moderado"
      build_variant:
        required: false
        type: string
        default: "both"
      run_lint:
        required: false
        type: boolean
        default: true
      run_native_matrix:
        required: false
        type: boolean
        default: true
      signing_mode:
        required: false
        type: string
        default: "auto"

permissions:
  contents: read
  actions: read

jobs:
  canonical-manual:
    if: github.event_name == 'workflow_dispatch'
    name: Delegar execução manual para fluxo canônico
    uses: ./.github/workflows/android-verified.yml
    with:
      provenance_run_id: ""
      expected_sha: ""
      provenance_manifest_hash: ""
      mode: ${{ github.event.inputs.mode }}
      build_variant: ${{ github.event.inputs.build_variant }}
      run_lint: ${{ github.event.inputs.run_lint == 'true' }}
      run_native_matrix: ${{ github.event.inputs.run_native_matrix == 'true' }}
      signing_mode: ${{ github.event.inputs.signing_mode }}
    secrets: inherit

  canonical-called:
    if: github.event_name == 'workflow_call'
    name: Delegar workflow_call para fluxo canônico
    uses: ./.github/workflows/android-verified.yml
    with:
      provenance_run_id: ${{ inputs.provenance_run_id }}
      expected_sha: ${{ inputs.expected_sha }}
      provenance_manifest_hash: ${{ inputs.provenance_manifest_hash }}
      mode: ${{ inputs.mode }}
      build_variant: ${{ inputs.build_variant }}
      run_lint: ${{ inputs.run_lint }}
      run_native_matrix: ${{ inputs.run_native_matrix }}
      signing_mode: ${{ inputs.signing_mode }}
    secrets: inherit
